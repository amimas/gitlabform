name: Releases

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (must start with v, e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  verify-release-tag:
    name: Verify release tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.set_release.outputs.release_tag }}
      release_ref: ${{ steps.set_release.outputs.release_ref }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release tag exists
        id: set_release
        run: |
          set -euo pipefail

          TAG="${{ github.event.inputs.tag }}"
          git fetch --prune --tags

          if [[ ! "$TAG" =~ ^v[0-9] ]]; then
            echo "Tag '${TAG}' is not a valid release tag. Must start with 'v' followed by a digit." >&2
            exit 1
          fi

          if ! git rev-parse --verify "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag '${TAG}' not found" >&2
            exit 1
          fi

          echo "release_tag=${TAG}" >> $GITHUB_OUTPUT
          echo "release_ref=refs/tags/${TAG}" >> $GITHUB_OUTPUT

  build-release-artifacts:
    name: Build release artifacts
    needs:
      - verify-release-tag
    uses: ./.github/workflows/build.yml
    with:
      BRANCH_REF: ${{ needs.verify-release-tag.outputs.release_ref }}

  publish-docs:
    name: Docs
    needs:
      - build-release-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify-release-tag.outputs.release_ref }}
          fetch-depth: 2
      - name: Download built documentation
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: site
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: gh-pages
          folder: site

  publish-to-github:
    name: Publish Release
    needs:
      - build-release-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Create release in GitHub
        uses: ncipollo/release-action@v1
        with:
          name: ${{ needs.verify-release-tag.outputs.release_tag }}
          body: "(this is a placeholder, it will be replaced with a changelog contents)"
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-to-pypi:
    name: Publish PyPI
    needs:
      - build-release-artifacts
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gitlabform
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify-release-tag.outputs.release_ref }}
          fetch-depth: 2
      - name: Configure uv environment
        uses: ./.github/actions/setup-uv-local
        with:
          python-version: "3.14"
      - name: Setup Python ${{ env.UV_PYTHON }} and install dependencies
        run: |
          uv sync --frozen --no-dev --group release
      # TODO: In a separate PR, consume the build artifact (package-dist) uploaded
      # in build-release-artifacts instead of rebuilding and verifying the package here.
      - name: Build and verify the package
        run: |
          uv run --no-sync package build
          uv run --no-sync package verify
      - name: Publish to PyPI
        run: |
          uv run --no-sync package publish

  publish-to-ghcr:
    name: Publish GHCR
    needs:
      - build-release-artifacts
      - publish-to-pypi
    runs-on: ubuntu-latest
    steps:
      # TODO: In a separate PR, optimize docker image build to consume the built package artifact
      # (package-dist) instead of copying and rebuilding from source if applicable.
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify-release-tag.outputs.release_ref }}
      - name: Get the version from the tag
        run: echo "VERSION=${GITHUB_REF/refs\/tags\/v/}" >> $GITHUB_ENV
      - name: Docker metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/gitlabform/gitlabform
          flavor: |
            latest=auto
          tags: |
            type=pep440,pattern={{version}}
            type=pep440,pattern={{major}}.{{minor}}
            type=pep440,pattern={{major}}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      # gitlabform/gitlabform image is going to be here
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          # This token is provided by Actions, you do not need to create your own token
          password: ${{ secrets.GITHUB_TOKEN }}
      # Docker image will use UV internally and builds the image from the Codebase at the current tag, rather than downloding from PyPi
      - name: Publish image to registries
        uses: docker/build-push-action@v7
        with:
          push: true
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
